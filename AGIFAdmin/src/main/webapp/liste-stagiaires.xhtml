<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets">

    <ui:composition template="/template.xhtml">
        <ui:define name="titre_page">
            <h:outputText value="#{lang.LABEL_GESTION_STAGIAIRE}"/>
        </ui:define>

        <ui:define name="titre1">
            <h:outputText value="#{lang.LABEL_LISTE_STAGIAIRES}"/>
        </ui:define>       
        <ui:define name="scripts">
            <script type="text/javascript" language="javascript" src="/AGIFAdmin/js/jquery-1.9.1.js"></script>
            <script type="text/javascript" language="javascript" src="/AGIFAdmin/js/jquery.dataTables.js"></script>        
            <script type="text/javascript" src="/AGIFAdmin/js/jquery.dataTables.columnFilter.js"></script>
            <script type="text/javascript" src="/AGIFAdmin/js/Datatable.fnClearFilter.js"></script>
            <script type="text/javascript" language="javascript" src="/AGIFAdmin/js/jquery.tooltip.js"></script>
        </ui:define>
        <ui:define name="contenu">
            <f:verbatim>          
                <link rel="stylesheet" type="text/css" href="/AGIFAdmin/css/jquery.dataTables.css" />
                <link rel="stylesheet" type="text/css" href="/AGIFAdmin/css/jquery.tooltip.css" />
                <script>
                    var asInitVals = new Array();
                    $(document).ready(function() {
                        $('div.item').tooltip();
                        var oTable = $('#listestagiaires').dataTable({
                            "bSortCellsTop": true,
                            "iDisplayLength": 100,
                            "aaSorting": [[5, "desc"]],
                            "bAutoWidth": false,
                            "bStateSave": true,
                            "sCookiePrefix": "Liste_Stagiaires_DataTable_",
                            "iCookieDuration": "session",
                            "sPaginationType": "full_numbers",
                            "aoColumns": [
                                {
                                    "bSortable": true
                                },
                                {
                                    "bSortable": true
                                },
                                {
                                    "bSortable": true
                                },
                                {
                                    "bSortable": true
                                },
                                {
                                    "bSortable": false
                                },                              
                                {
                                    "bSortable": false
                                },
                                {
                                    "bSortable": false
                                }
                            ],
                            "oLanguage": {
                                "sProcessing": "Chargement...",
                                "sLengthMenu": "Afficher _MENU_ entrées",
                                "sZeroRecords": "Aucun résultat trouvé",
                                "sEmptyTable": "Aucune donnée dans la table",
                                "sInfo": "Affiche _START_ à _END_ sur un total de _TOTAL_ entrées",
                                "sInfoEmpty": "Affiche 0 entrées sur un total de 0 entrées",
                                "sInfoFiltered": "(filtrées sur un total de _MAX_ entrées)",
                                "sInfoPostFix": "",
                                "sSearch": "Chercher sur toutes les colonnes:",
                                "sUrl": "",
                                "oPaginate": {
                                    "sFirst": "&laquo;",
                                    "sPrevious": "&lt;",
                                    "sNext": "&gt;",
                                    "sLast": "&raquo;"
                                },
                                "fnInfoCallback": null
                            }
                        });

                        $("thead input").keyup(function() {
                            /* Filter on the column (the index) of this element */
                            //oTable.fnFilter( this.value, $("thead input").index(this) );
                            oTable.fnFilter(this.value, $(this).parent().parent().children('th').index($(this).parent()));
                        });
                        $("thead select").change(function() {
                            /* Filter on the column (the index) of this element */
                            //if ($(this).prop("selectedIndex")
                            oTable.fnFilter(this.value, $(this).parent().parent().children('th').index($(this).parent()));
                        });
                        /*
                         * Support functions to provide a little bit of 'user friendlyness' to the textboxes in
                         * the footer
                         */
                        $("thead input").each(function(i) {
                            asInitVals[$(this).parent().parent().children('th').index($(this).parent())] = this.value;
                        });
                        $("thead input").focus(function() {
                            if (this.className == "search_init")
                            {
                                this.className = "";
                                this.value = "";
                            }
                        });

                        $('#effacer_filtres').click(function() {
                            var oTable = $('#listestagiaires').dataTable();
                            oTable.fnFilterClear();
                            $("thead input").val("");
                            $("thead select").val("");
                        });

                        $("thead input").blur(function(i) {
                            if (this.value == "")
                            {
                                this.className = "search_init";
                                this.value = asInitVals[$("thead input").parent().parent().children('th').index($(this).parent())];
                            }
                        });
                        function fill_search_fields() {
                            var oSettings = oTable.fnSettings();
                            $("thead input").each(function(i) {
                                if (oSettings.aoPreSearchCols[$(this).parent().parent().children('th').index($(this).parent())]['sSearch'] != '') {
                                    $(this).val(oSettings.aoPreSearchCols[$(this).parent().parent().children('th').index($(this).parent())]['sSearch']);
                                    $(this).removeClass("search_init");
                                }
                            });
                            $("thead select").each(function(i) {
                                if (oSettings.aoPreSearchCols[$(this).parent().parent().children('th').index($(this).parent())]['sSearch'] != '') {
                                    $(this).val(oSettings.aoPreSearchCols[$(this).parent().parent().children('th').index($(this).parent())]['sSearch']);
                                    $(this).removeClass("search_init");
                                }
                            });
                            if (oSettings.oPreviousSearch['sSearch'] != '') {
                                $('.search_field').val(oSettings.oPreviousSearch['sSearch']);
                            }
                        }
                        fill_search_fields();
                    });
                </script>
            </f:verbatim>

            <h:form prependId="false">
                <h:outputLink styleClass="action_datatables" id="effacer_filtres">
                    <h:outputText value="#{lang.LABEL_EFFACER_FILTRES}"/>
                </h:outputLink>
                <h:panelGroup id="messagePanel" layout="block">
                    <h:messages layout="list" errorClass="message erreur"
                                infoClass="message valide"/>
                </h:panelGroup>
                <!-- <h:commandButton  value="#{lang.LABEL_CREER_STAGIAIRE}"
                                  action="new"/> -->
                <h:dataTable value="#{listStagiairesBean.stagiairesItems}"
                             var="item" 
                             styleClass="tableau"
                             headerClass="row_header"
                             id="listestagiaires"
                             binding="#{listStagiairesBean.dataTable}">


                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{lang.LABEL_CIVILITE}"/>
                            <f:verbatim>                            
                                <input type="text"  value="#{lang.LABEL_CIVILITE}" 
                                       name="search_civilite"  class="search_init"/>

                            </f:verbatim>
                        </f:facet>
                        <h:outputText value="#{item.civilite}"/>
                    </h:column>

                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{lang.LABEL_NOM}"/>
                            <f:verbatim>                            
                                <input type="text"  value="#{lang.LABEL_NOM}" 
                                       name="search_nom"  class="search_init"/>

                            </f:verbatim>
                        </f:facet>
                        <h:outputText value="#{item.nom}"/>
                    </h:column>

                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{lang.LABEL_PRENOM}"/>
                            <f:verbatim>                            
                                <input type="text"  value="#{lang.LABEL_PRENOM}" 
                                       name="search_prenom"  class="search_init"/>

                            </f:verbatim>
                        </f:facet>
                        <h:outputText value="#{item.prenom}"/>
                    </h:column>


                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{lang.LABEL_ETABLISSEMENT}"/>
                            <f:verbatim>                            
                                <input type="text"  value="#{lang.LABEL_ETABLISSEMENT}" 
                                       name="search_etablissement"  class="search_init"/>

                            </f:verbatim>
                        </f:facet>
                        <h:outputText value="#{item.etablissement}"/>
                    </h:column>

                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{lang.LABEL_INFORMATIONS}"/>
                        </f:facet>
                        <div class="item">
                            <h:graphicImage value="/images/Show.png"
                                            style="border: 0px;display:block;"/>

                            <div style="display:none" class="tooltip_description"> 
                                <h:panelGroup> 
                                    <h:panelGrid columns="2" >
                                        <h:outputText styleClass="champ" value="#{lang.LABEL_NOM_SERVICE}" />
                                        <h:outputText value="#{item.adresse}"/>
                                        
                                        <h:outputText styleClass="champ" value="#{lang.LABEL_ADRESSE}" />
                                        <h:outputText value="#{item.adresse2}"/>
                                        
                                        <h:outputText styleClass="champ" value="#{lang.LABEL_ADRESSE_COMPLEMENT}" />
                                        <h:outputText value="#{item.adresse3}"/>
                                        
                                        <h:outputText styleClass="champ" value="#{lang.LABEL_CODEPOSTAL}" />
                                        <h:outputText value="#{item.codepostal}"/>
                                        
                                        <h:outputText styleClass="champ" value="#{lang.LABEL_VILLE}" />
                                        <h:outputText value="#{item.ville}"/>
                                        
                                        <h:outputText styleClass="champ" value="#{lang.LABEL_TELEPHONE}" />
                                        <h:outputText value="#{item.telephone}"/>
                                        
                                        <h:outputText styleClass="champ" value="#{lang.LABEL_MAIL}" />
                                        <h:outputText value="#{item.mail}"/>

                                        <h:outputText styleClass="champ" value="#{lang.LABEL_MAIL_COORDINATEUR}"/>
                                        <h:outputText value="#{item.mailcoordinateur}"/>

                                        <h:outputText styleClass="champ"
                                                      value="#{lang.LABEL_CHOIX_PRIORITAIRE}"/>
                                        <h:outputText value="#{item.inscriptionList[0].idsessions1.titre}"/>
                                        <h:outputText styleClass="champ"
                                                      value="#{lang.LABEL_CHOIX_SECONDAIRE}"/>
                                        <h:outputText value="#{item.inscriptionList[0].idsessions2.titre}"/>
                                    </h:panelGrid>
                                </h:panelGroup>
                            </div>
                        </div>  
                    </h:column>
                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{lang.LABEL_MODIFIER}"/>
                        </f:facet>
                        <h:commandLink action="#{listStagiairesBean.modify}">
                            <h:graphicImage value="/images/Edit.png"
                                            style="border: 0px"/>
                        </h:commandLink>
                    </h:column>                   
                    <h:column>
                        <f:facet name="header">
                            <h:outputText value="#{lang.LABEL_SUPPRIMER}"/>
                        </f:facet>
                        <h:commandLink
                            onclick="if (!confirm('#{lang.MSG_CONFIRM_SUPPRIMER}'))
                                return false"
                            action="#{listStagiairesBean.delete}">
                            <h:graphicImage  value="/images/delete.png"
                                             style="border: 0px"/>
                        </h:commandLink>
                    </h:column>                  

                </h:dataTable>


            </h:form>
        </ui:define>
    </ui:composition>
</html>
