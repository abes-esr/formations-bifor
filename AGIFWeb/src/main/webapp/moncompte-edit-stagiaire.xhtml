<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:a4j="http://richfaces.org/a4j"
      xmlns:rich="http://richfaces.org/rich">

    <ui:composition template="/template.xhtml">
        <ui:define name="titre_page">
            <h:outputText value="#{lang.LABEL_COMPTE_UTILISATEUR}"/>
        </ui:define>

        <ui:define name="titre1">
            <h:outputText value="#{lang.LABEL_COMPTE_UTILISATEUR}"/>
        </ui:define>

        <ui:define name="titre2">
            <h:outputText value="#{lang.LABEL_MODIFIER_INFORMATIONS_PERSONNELLES}"/>
        </ui:define> 

        <ui:define name="menu_moncompte">
            <li>
                <a class="dropdown-button" href="#!" data-activates="dropdown-menu-compte">
                    <h:outputText value="#{lang.LABEL_MODIFIER_COMPTE}"/>&nbsp;<i class="fa fa-caret-down" aria-hidden="true"></i>
                </a>
            </li>
            
            <ul id="dropdown-menu-compte" class="dropdown-content">
                <li><h:commandLink value="#{lang.LABEL_MES_INSCRIPTIONS}" action="list" immediate="true"/></li>
                <li><h:commandLink value="#{lang.LABEL_MODIFIER_COMPTE}" action="edit-id" immediate="true"/></li>
                <li class="divider"></li>
                <li><h:commandLink value="#{lang.LABEL_DECONNECTER}" action="#{stagiaireBean.logout}" immediate="true"/></li>
            </ul>
        </ui:define>

        <ui:define name="contenu">
            <h:form id="iForm">
                <h:panelGroup id="messagePanel" layout="block">
                    <h:messages layout="list"  globalOnly="true" errorClass="message erreur" infoClass="message valide"/>
                </h:panelGroup>

                <fieldset>
                    <legend>
                        <h:outputText value="#{lang.LABEL_INFORMATIONS_PERSONNELLES}"/>
                    </legend>
                    <h:panelGrid columns="3" id="panel_personnel">
                        <h:panelGroup>
                            <h:outputLabel for="civiliteInput" value="#{lang.LABEL_CIVILITE}*" />
                        </h:panelGroup>
                        <h:panelGroup/><h:panelGroup/>
                        <h:selectOneRadio  id="civiliteInput" value="#{stagiaireBean.stagiaire.civilite}" title="Civilité" required="true" requiredMessage="#{lang.MSG_CIVILITE_OBLIGATOIRE}">
                            <f:selectItem id="Mr" itemLabel="#{lang.LABEL_MONSIEUR}" itemValue="#{lang.LABEL_MONSIEUR}" />
                            <f:selectItem id="Mme" itemLabel="#{lang.LABEL_MADAME}" itemValue="#{lang.LABEL_MADAME}" />
                            <f:selectItem id="nd" itemLabel="#{lang.LABEL_NON_SPECIFIE}" itemValue="#{lang.LABEL_NON_SPECIFIE}" />
                        </h:selectOneRadio>
                        <h:panelGroup/>
                        <h:message for="civiliteInput" errorClass="message erreur"/>

                        <h:panelGroup>
                            <h:outputLabel for="nomInput" value="#{lang.LABEL_NOM}*" />
                        </h:panelGroup>
                        <h:panelGroup/><h:panelGroup/>
                        <h:inputText id="nomInput" value="#{stagiaireBean.stagiaire.nom}" title="NOM" required="true" requiredMessage="#{lang.MSG_NOM_OBLIGATOIRE}" size="50" maxlength="200" style="text-transform:uppercase;">
                            <f:validator validatorId="fieldValidator"/>
                            <f:attribute name="typeValidator" value="name"/>
                            <f:attribute name="messageValidator" value="#{lang.MSG_FORMAT_NOM_INVALIDE}"/>
                            <f:validateLength minimum="2" maximum="200"/>
                        </h:inputText>
                        <h:panelGroup/>
                        <h:message for="nomInput" errorClass="message erreur" />

                        <h:panelGroup>
                            <h:outputLabel for="prenomInput" value="#{lang.LABEL_PRENOM}*" />
                        </h:panelGroup>
                        <h:panelGroup/><h:panelGroup/>
                        <h:inputText id="prenomInput" value="#{stagiaireBean.stagiaire.prenom}" title="Prénom" required="true" requiredMessage="#{lang.MSG_PRENOM_OBLIGATOIRE}" size="50" maxlength="200" style="text-transform:capitalize;">
                            <f:validator validatorId="fieldValidator"/>
                            <f:attribute name="typeValidator" value="firstname"/>
                            <f:attribute name="messageValidator" value="#{lang.MSG_FORMAT_PRENOM_INVALIDE}"/>
                            <f:validateLength minimum="2" maximum="200"/>
                        </h:inputText>
                        <h:panelGroup/>
                        <h:message for="prenomInput" errorClass="message erreur" warnClass="message info" infoClass="message valide"/>                        
                    </h:panelGrid>
                </fieldset>

                <fieldset>
                    <legend>
                        <h:outputText value="#{lang.LABEL_FONCTION_ETABLISSEMENT}"/>
                    </legend>
                    <h:panelGrid columns="3" id="panel_fonction">
                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedFonction}">
                            <h:outputLabel for="fonctionInput" value="#{lang.LABEL_FONCTION}*" />
                        </h:panelGroup>
                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedFonction}"/>
                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedFonction}"/>
                        <h:inputText id="fonctionInput" value="#{stagiaireBean.stagiaire.fonction}" title="Fonction (exemple : « catalogage des périodiques »)" required="true" requiredMessage="#{lang.MSG_FONCTION_OBLIGATOIRE}" size="50" maxlength="200" rendered="#{editInformationsMonCompteBean.renderedFonction}">
                            <f:validateLength minimum="2" maximum="200"/>
                            <f:validator validatorId="fieldValidator"/>
                            <f:attribute name="typeValidator" value="fonction"/>
                            <f:attribute name="messageValidator" value="#{lang.MSG_FORMAT_FONCTION_INVALIDE}"/>
                        </h:inputText>
                        <rich:panel style="border:0px;" rendered="#{editInformationsMonCompteBean.renderedFonction}">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-square fa-stack-2x"></i>
                                <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                            </span>
                            <rich:tooltip layout="block">
                                <h:outputText value="#{lang.AIDE_FONCTION}" />
                            </rich:tooltip>
                        </rich:panel>
                        <h:message for="fonctionInput" errorClass="message erreur" rendered="#{editInformationsMonCompteBean.renderedFonction}"/>

                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedService}">
                            <h:outputLabel for="serviceInput" value="#{lang.LABEL_SERVICE}" />
                        </h:panelGroup>
                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedService}"/>
                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedService}"/>
                        <h:inputText id="serviceInput" value="#{stagiaireBean.stagiaire.service}" title="Service (exemple : « Ressources Humaines »)" required="true" requiredMessage="#{lang.MSG_SERVICE_OBLIGATOIRE}" size="50" maxlength="200" rendered="#{editInformationsMonCompteBean.renderedService}">
                            <f:validateLength minimum="2" maximum="200"/>
                        </h:inputText>
                        <rich:panel style="border:0px;" rendered="#{editInformationsMonCompteBean.renderedService}">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-square fa-stack-2x"></i>
                                <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                            </span>
                            <rich:tooltip layout="block">
                                <h:outputText value="#{lang.AIDE_SERVICE}" />
                            </rich:tooltip>
                        </rich:panel>
                        <h:message for="serviceInput" errorClass="message erreur" rendered="#{editInformationsMonCompteBean.renderedService}"/>
                        
                        <h:panelGroup>
                            <h:outputLabel for="etablissementInput" value="#{lang.LABEL_ETABLISSEMENT}*" />
                        </h:panelGroup>
                        <h:panelGroup/> <h:panelGroup/>
                        <h:selectOneMenu id="etablissementInput" value="#{stagiaireBean.stagiaire.etablissement}" title="Etablissement" required="true" style="width:250px;" requiredMessage="#{lang.MSG_ETABLISSEMENT_OBLIGATOIRE}" valueChangeListener="#{editInformationsMonCompteBean.changeEtablissement}">
                            <f:selectItems value="#{editInformationsMonCompteBean.etablissementItems}"/>
                            <a4j:ajax event="valueChange" oncomplete="Materialize.updateTextFields();" render="rcrInput,adresseInput,adresse2Input,adresse3Input,codePostalInput,villeInput,telephoneInput" execute="@this" />
                        </h:selectOneMenu>
                        <rich:panel style="border:0px;">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-square fa-stack-2x"></i>
                                <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                            </span>
                            <rich:tooltip layout="block">
                                <h:outputText value="#{lang.AIDE_ETABLISSEMENT}" />
                            </rich:tooltip>
                        </rich:panel>
                        <h:message for="etablissementInput" errorClass="message erreur"/>

                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedRCR}">
                            <h:outputLabel for="rcrInput" value="#{lang.LABEL_NUMRCR}*" />
                        </h:panelGroup>
                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedRCR}"/>
                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedRCR}"/>
                        <h:selectOneMenu id="rcrInput" value="#{stagiaireBean.stagiaire.numrcr}" required="true" style="width:250px;" rendered="#{editInformationsMonCompteBean.renderedRCR}" requiredMessage="#{lang.MSG_RCR_OBLIGATOIRE}" valueChangeListener="#{editInformationsMonCompteBean.changeRCR}">
                            <f:selectItems value="#{editInformationsMonCompteBean.rcrItems}"/>
                            <a4j:ajax event="valueChange" oncomplete="Materialize.updateTextFields();" render="adresseInput,adresse2Input,adresse3Input,codePostalInput,villeInput,telephoneInput"  execute="@this" />                                        
                        </h:selectOneMenu>
                        <rich:panel style="border:0px;" rendered="#{editInformationsMonCompteBean.renderedRCR}">
                            <span class="fa-stack fa-lg">
                                <i class="fa fa-square fa-stack-2x"></i>
                                <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                            </span>
                            <rich:tooltip layout="block">
                                <h:outputText value="#{lang.AIDE_RCR}" />
                            </rich:tooltip>
                        </rich:panel>
                        <h:message for="rcrInput" errorClass="message erreur" rendered="#{editInformationsMonCompteBean.renderedRCR}"/>                        
                    </h:panelGrid>
                </fieldset>

                <fieldset>
                    <legend>
                        <h:outputText value="#{lang.LABEL_COORDONNEES}"/>
                    </legend>

                    <h:panelGrid columns="2"  id="panel_adresse">
                        <h:panelGroup>
                            <h:outputLabel for="adresseInput" value="#{lang.LABEL_ADRESSE}*" />
                        </h:panelGroup>
                        <h:panelGroup/>
                        <h:panelGrid columns="2">
                            <h:inputText id="adresseInput" value="#{stagiaireBean.stagiaire.adresse}" title="Adresse où sera envoyée la convocation" required="true" size="50" maxlength="200" requiredMessage="#{lang.MSG_ADRESSE_OBLIGATOIRE}"/>
                            <rich:panel style="border:0px;">
                                <span class="fa-stack fa-lg">
                                    <i class="fa fa-square fa-stack-2x"></i>
                                    <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                                </span>
                                <rich:tooltip layout="block">
                                    <h:outputText value="#{lang.AIDE_ADRESSE}" />
                                </rich:tooltip>
                            </rich:panel>
                        </h:panelGrid>
                        <h:message for="adresseInput" errorClass="message erreur"/>

                        <h:panelGroup>
                            <h:outputLabel for="adresse2Input" value="#{lang.LABEL_ADRESSE_COMPLEMENT}"/>
                        </h:panelGroup>
                        <h:panelGroup/>

                        <h:panelGrid columns="2">
                            <h:inputText id="adresse2Input" size="50" maxlength="200" value="#{stagiaireBean.stagiaire.adresse2}" title="Suite de l'adresse"/>
                            <rich:panel style="border:0px;">
                                <span class="fa-stack fa-lg">
                                    <i class="fa fa-square fa-stack-2x"></i>
                                    <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                                </span>
                                <rich:tooltip layout="block">
                                    <h:outputText value="#{lang.AIDE_ADRESSE_SUITE}" />
                                </rich:tooltip>
                            </rich:panel>
                        </h:panelGrid>
                        <h:message for="adresse2Input" errorClass="message erreur"/>

                        <h:panelGroup>
                            <h:outputLabel for="adresse3Input" value="#{lang.LABEL_ADRESSE_SUITE}"/>
                        </h:panelGroup>
                        <h:panelGroup/>
                        <h:panelGrid columns="2">
                            <h:inputText id="adresse3Input" size="50" maxlength="200" value="#{stagiaireBean.stagiaire.adresse3}" title="Suite de l'adresse"/>
                            <rich:panel style="border:0px;">
                                <span class="fa-stack fa-lg">
                                    <i class="fa fa-square fa-stack-2x"></i>
                                    <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                                </span>
                                <rich:tooltip layout="block">
                                    <h:outputText value="#{lang.AIDE_ADRESSE_SUITE}" />
                                </rich:tooltip>
                            </rich:panel>
                        </h:panelGrid>
                        <h:message for="adresse3Input" errorClass="message erreur"/>

                        <h:panelGroup>
                            <h:outputLabel for="codePostalInput" value="#{lang.LABEL_CODEPOSTAL}*" />
                        </h:panelGroup>
                        <h:panelGroup/>
                        <h:panelGrid columns="2">
                            <h:inputText id="codePostalInput" value="#{stagiaireBean.stagiaire.codepostal}" title="Code postal" required="true" requiredMessage="#{lang.MSG_CODEPOSTAL_OBLIGATOIRE}" size="9" maxlength="5">
                                <f:validator validatorId="fieldValidator"/>
                                <f:attribute name="typeValidator" value="codepostal"/>
                                <f:attribute name="messageValidator" value="#{lang.MSG_FORMAT_CODEPOSTAL_INVALIDE}"/>
                                <f:validateLength minimum="5" maximum="5"/>
                            </h:inputText>
                            <rich:panel style="border:0px;">
                                <span class="fa-stack fa-lg">
                                    <i class="fa fa-square fa-stack-2x"></i>
                                    <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                                </span>
                                <rich:tooltip layout="block">
                                    <h:outputText value="#{lang.AIDE_CODEPOSTAL}" />
                                </rich:tooltip>
                            </rich:panel>
                        </h:panelGrid>
                        <h:message for="codePostalInput" errorClass="message erreur"/>                        

                        <h:panelGroup>
                            <h:outputLabel for="villeInput" value="#{lang.LABEL_VILLE}*" />
                        </h:panelGroup>
                        <h:panelGroup/>
                        <h:panelGrid columns="2">
                            <h:inputText id="villeInput" value="#{stagiaireBean.stagiaire.ville}" title="Ville" required="true" requiredMessage="#{lang.MSG_VILLE_OBLIGATOIRE}" size="30" maxlength="30">
                                <f:validator validatorId="fieldValidator"/>
                                <f:attribute name="typeValidator" value="ville"/>
                                <f:attribute name="messageValidator" value="#{lang.MSG_FORMAT_VILLE_INVALIDE}"/>
                                <f:validateLength minimum="2" maximum="30"/>
                            </h:inputText>
                            <rich:panel style="border:0px;">
                                <span class="fa-stack fa-lg">
                                    <i class="fa fa-square fa-stack-2x"></i>
                                    <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                                </span>
                                <rich:tooltip layout="block">
                                    <h:outputText value="#{lang.AIDE_VILLE}" />
                                </rich:tooltip>
                            </rich:panel>
                        </h:panelGrid>
                        <h:message for="villeInput" errorClass="message erreur"/>                        

                        <h:panelGroup>
                            <h:outputLabel for="telephoneInput" value="#{lang.LABEL_TELEPHONE}*" />
                        </h:panelGroup>
                        <h:panelGroup/>
                        <h:panelGrid columns="2">
                            <h:inputText id="telephoneInput" value="#{stagiaireBean.stagiaire.telephone}" title="Téléphone" size="15" maxlength="20">
                                <f:validator validatorId="fieldValidator"/>
                                <f:attribute name="typeValidator" value="phone"/>
                                <f:attribute name="messageValidator" value="#{lang.MSG_FORMAT_TELEPHONE_INVALIDE}"/>
                                <f:validateLength minimum="10" maximum="20"/>
                            </h:inputText>
                            <rich:panel style="border:0px;">
                                <span class="fa-stack fa-lg">
                                    <i class="fa fa-square fa-stack-2x"></i>
                                    <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                                </span>
                                <rich:tooltip layout="block">
                                    <h:outputText value="#{lang.AIDE_TELEPHONE}" />
                                </rich:tooltip>
                            </rich:panel>
                        </h:panelGrid>
                        <h:message for="telephoneInput" errorClass="message erreur"/>                        

                        <h:panelGroup>
                            <h:outputLabel for="mailInput" value="#{lang.LABEL_MAIL}*" />
                        </h:panelGroup>
                        <h:panelGroup/>
                        <h:panelGrid columns="2">
                            <h:inputText id="mailInput" value="#{stagiaireBean.stagiaire.mail}" title="Mail" required="true" requiredMessage="#{lang.MSG_MAIL_OBLIGATOIRE}" size="50" maxlength="50" validator="#{editInformationsMonCompteBean.checkMail}"/>
                            <rich:panel style="border:0px;">
                                <span class="fa-stack fa-lg">
                                    <i class="fa fa-square fa-stack-2x"></i>
                                    <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                                </span>
                                <rich:tooltip layout="block">
                                    <h:outputText value="#{lang.AIDE_MAIL}" />
                                </rich:tooltip>
                            </rich:panel>
                        </h:panelGrid>
                        <h:message for="mailInput" errorClass="message erreur"/>

                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedCoordinateur}">
                            <h:outputLabel for="mailCoordinateurInput" value="#{editInformationsMonCompteBean.labelCoordinateur}*" />
                        </h:panelGroup>
                        <h:panelGroup rendered="#{editInformationsMonCompteBean.renderedCoordinateur}"/>
                        <h:panelGrid columns="2" rendered="#{editInformationsMonCompteBean.renderedCoordinateur}">
                            <h:inputText id="mailCoordinateurInput" value="#{stagiaireBean.stagiaire.mailcoordinateur}" title="Mail du coordinateur" required="true" requiredMessage="#{lang.MSG_MAIL_OBLIGATOIRE}" size="100" maxlength="100" rendered="#{editInformationsMonCompteBean.renderedCoordinateur}">
                                <f:validator validatorId="fieldValidator"/>
                                <f:attribute name="typeValidator" value="mailCoordinateur"/>
                                <f:attribute name="messageValidator" value="#{lang.MSG_FORMAT_MAIL_INVALIDE}"/>
                            </h:inputText>
                            <rich:panel style="border:0px;" rendered="#{editInformationsMonCompteBean.renderedCoordinateur}">
                                <span class="fa-stack fa-lg">
                                    <i class="fa fa-square fa-stack-2x"></i>
                                    <i class="fa fa-info fa-stack-1x fa-inverse"></i>
                                </span>
                                <rich:tooltip layout="block">
                                    <h:outputText value="#{lang.AIDE_MAIL_COORDINATEUR}" />
                                </rich:tooltip>
                            </rich:panel>
                        </h:panelGrid>
                        <h:message rendered="#{editInformationsMonCompteBean.renderedCoordinateur}" for="mailCoordinateurInput" errorClass="message erreur"/>
                    </h:panelGrid>
                </fieldset>

                <br /><br />
                <h:commandButton styleClass="btn bifor-blue" value="#{lang.LABEL_ENREGISTRER}" type="submit" action="#{editInformationsMonCompteBean.save}"/>
                <h:commandLink styleClass="btn grey" value="#{lang.LABEL_ANNULER}" action="#{editInformationsMonCompteBean.back}" type="button" immediate="true"/>
            </h:form>

        </ui:define>
    </ui:composition>
</html>
